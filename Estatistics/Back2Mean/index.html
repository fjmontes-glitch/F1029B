<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>F1029 - El Mito del Talento (Regresión a la Media)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        
        /* Contenedor de botones */
        .btn-container { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        
        .coin-btn { 
            font-size: 50px; cursor: pointer; border: 4px solid #eee; border-radius: 50%; 
            width: 100px; height: 100px; background: white; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }

        /* Estados de los botones */
        .coin-btn.selected-win { border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; transform: scale(1.1); }
        .coin-btn.selected-loss { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; transform: scale(0.9); opacity: 0.6; }
        .coin-btn.disabled { pointer-events: none; }

        #message { font-weight: bold; font-size: 1.2em; height: 1.5em; margin: 10px 0; color: #555; }
        .stats { background: #e8f0fe; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .history-chart { margin-top: 20px; height: 250px; }
        
        button#retryBtn { 
            background: #0033a0; color: white; border: none; padding: 12px 24px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>F1029: ¿Talento o Suerte?</h2>
    <p id="Explicación">Juguemos Volados, veamos si tienes talento o solo suerte.</p>
    <p id="instruction">Haz tu predicción: ¿Qué caerá?</p>
    
    <div id="game">
        <div id="progress"><b>Intento: 1 / 20</b></div>
        
        <div class="btn-container">
            <button id="btn0" class="coin-btn" onclick="play(0)">🦅</button>
            <button id="btn1" class="coin-btn" onclick="play(1)">☀️</button>
        </div>
        
        <div id="message">Elige una cara...</div>
    </div>

    <div id="results" class="stats">
        <h3 id="resultTitle"></h3>
        <p id="resultText"></p>
        <button id="retryBtn" onclick="resetGame()">Repetir para "Validar Talento"</button>
        <p id="Burla">...o darte cuenta que solo tuviste (mala) suerte.</p>
    </div>

    <div class="history-chart">
        <canvas id="regresionChart"></canvas>
    </div>

    <div style="text-align: right; margin-top: 20px; font-size: 0.75em; color: #aaa; font-style: italic;">
        Diseñado por Francisco Montes
    </div>
</div>

<script>
    let attempts = 0;
    let score = 0;
    let history = [];
    let myChart;

    function play(choice) {
        if (attempts >= 20) return;

        const result = Math.floor(Math.random() * 2);
        const win = (choice === result);
        const btnSelected = document.getElementById(`btn${choice}`);
        
        // 1. Bloquear clics y mostrar feedback
        document.querySelectorAll('.coin-btn').forEach(b => b.classList.add('disabled'));
        
        if (win) {
            score++;
            btnSelected.classList.add('selected-win');
            document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>¡ACERTASTE! ✨</span>";
        } else {
            btnSelected.classList.add('selected-loss');
            document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>FALLASTE... ❌</span>";
        }

        attempts++;

        // 2. Esperar para limpiar y pedir el siguiente
        setTimeout(() => {
            if (attempts < 20) {
                document.querySelectorAll('.coin-btn').forEach(b => {
                    b.classList.remove('disabled', 'selected-win', 'selected-loss');
                });
                document.getElementById('message').innerText = "¡Adivina el siguiente!";
                document.getElementById('instruction').innerText = "¿Qué caerá ahora?";
                document.getElementById('progress').innerHTML = `<b>Intento: ${attempts + 1} / 20</b>`;
            } else {
                finishRound();
            }
        }, 800);
    }

    function finishRound() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('instruction').innerText = "Análisis de Desempeño";
        history.push(score);
        
        let title = score >= 14 ? "¡Eres un fenómeno!" : (score <= 6 ? "¡Qué mala racha!" : "Desempeño Normal");
        let text = `Adivinaste ${score} de 20. Si crees que esto es "habilidad", vuelve a intentarlo para demostrarlo.`;

        document.getElementById('resultTitle').innerText = title;
        document.getElementById('resultText').innerText = text;
        updateChart();
    }

    function resetGame() {
        attempts = 0;
        score = 0;
        document.getElementById('game').style.display = 'block';
        document.getElementById('results').style.display = 'none';
        document.getElementById('instruction').innerText = "Haz tu predicción: ¿Qué caerá?";
        document.getElementById('progress').innerHTML = "<b>Intento: 1 / 20</b>";
        document.getElementById('message').innerText = "Elige un bando...";
        document.querySelectorAll('.coin-btn').forEach(b => {
            b.classList.remove('disabled', 'selected-win', 'selected-loss');
        });
    }

    function updateChart() {
        const ctx = document.getElementById('regresionChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: history.map((_, i) => `Ronda ${i+1}`),
                datasets: [{
                    label: 'Aciertos (Azar puro)',
                    data: history,
                    backgroundColor: '#0033a0'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { min: 0, max: 20 } }
            }
        });
    }
</script>
</body>
</html>
